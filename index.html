<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My personal portfolio showcasing projects and skills.">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link href="https://fonts.googleapis.com/css?family=Sora:100,200,300,regular,500,600,700,800" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Bruno+Ace+SC:regular" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>My personal portfolio</title>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes show {

            0%,
            49.99% {
                opacity: 0;
                z-index: 1;
            }

            50%,
            100% {
                opacity: 1;
                z-index: 5;
            }
        }

        html {
            font-family: "Poppins", sans-serif;
            scroll-behavior: smooth;
            margin: 0;
            animation: fadeIn 0.6s ease-out;
            padding: 0;
            color: white;
            width: 100%;
            height: 100vh;
        }

        body {
            margin: 0;
            line-height: 1.6;
            background-color: black;
            width: 100%;
        }

        header {
            width: 100%;
            margin-top: 15px;
            position: fixed;
            top: 0;
            display: flex;
            left: 0;
            height: auto;
            background: transparent;
            align-items: center;
            justify-content: space-around;
            filter: drop-shadow(10px);
            z-index: 1000;
        }

        header .logo {
            width: 120px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        header .logo:hover {
            transform: scale(1.05);
            transition: all 0.3s ease-in-out;
        }
        .typing-text {
            animation: fadeIn 0.6s ease-out;
            background: linear-gradient(to right, aqua, rgb(173, 172, 172));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #menu-icon {
            display: none;
            font-size: 30px;
            cursor: pointer;
            color: white;
            z-index: 1000;
            transition: all 0.3s ease-in-out;
        }

        #menu-icon:hover {
            transform: translateY(-5px);
            color: aqua;
        }

        .menu-toggle {
            padding: 10px 20px;
        }

        /* Sidebar Styles */
        .sidebar {
            display: none;
            position: fixed;
            left: -50%;
            top: 0;
            width: 250px;
            height: 100vh;
            background: linear-gradient(to bottom, cyan, rgb(173, 172, 172));
            padding-top: 80px;
            transition: left 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 2px 0 15px rgba(67, 97, 238, 0.3);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-close {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease-in-out;
        }

        .sidebar-close:hover {
            transform: translateY(-5px);
            color: black;
        }

        .sidebar-links {
            display: flex;
            flex-direction: column;
            list-style: none;
            margin: 0;
            padding: 20px 0;
        }

        .sidebar-links li {
            margin: 0;
            padding: 10px 20px;
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-links li:hover {
            padding-left: 30px;
            text-decoration: none;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }

        .sidebar-links a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            transition: all 0.3s ease-in-out;
        }

        .sidebar-links a:hover {
            color: black;
        }

        .sidebar-links .active {
            color: black;
        }
        nav {
            height: auto;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .navbar ul li {
            list-style: none;
            display: inline-block;
            margin: 10px 30px;
        }

        li:hover {
            text-decoration: none;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }
        .navbar ul li a {
            font-size: 18px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease-in-out;
            border-bottom: 3px solid transparent;
        }

        .navbar a:hover {
            color: aqua;
            border-bottom: 3px solid;
        }

        .navbar .active{
            color: aqua;
            border-bottom: 3px solid;
        }

        .contact {
            background-color: turquoise;
            color: white;
        }

        .home-section {
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            background-color: black;
            padding-top: 10%;
            height: auto;
        }

        .home-content h1 {
            font-size: 80px;
            font-weight: 600;
            line-height: 0.5px;
            font-family: "Sora", sans-serif;
        }

        .home-content h3 {
            font-size: 40px;
            margin-bottom: 10px;
            font-weight: 500;
            font-family: "Sora", sans-serif;
        }

        .home-content p {
            font-size: 20px;
        }

        p {
            line-height: 0.5;
        }

        .me {
            width: 70%;
            border-radius: 50%;
            margin-top: 5px;
            animation: float 3s ease-in-out infinite;
        }

        .home-img {
            border-radius: 50%;
        }

        .home-img img {
            position: relative;
            width: 32vw;
            box-shadow: 0 0 25px rgb(90, 90, 90);
            transition: all 0.4s ease-in-out;
        }

        .home-img img:hover {
            transform: translateY(-5px);
            transition: all 0.4s ease-in-out;
            box-shadow: 0 0 25px rgb(155, 155, 155);
            cursor: pointer;
        }

        span {
            color: aqua;
        }

        .socials a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 3rem;
            height: 3rem;
            margin-bottom: 5px;
            margin-left: 5px;
            background-color: transparent;
            text-decoration: none;
            color: white;
            font-size: 25px;
            border-radius: 50%;
            transition: all 0.4s ease-in-out;
        }

        .socials a:hover {
            color: black;
            background-color: aqua;
            transform: scale(1.0) translateY(-2px);
            box-shadow: 0 0 8px rgb(155, 155, 155);
        }

        .contact,
        .cta-button {
            display: inline-block;
            padding: 15px 50px;
            background-color: black;
            border-radius: 80px;
            font-size: 18px;
            margin-top: 5px;
            color: aqua;
            text-decoration: none;
            letter-spacing: 0.5px;
            font-weight: 500;
            border: 2px solid aqua;
            transition: all 0.4s ease-in-out;
        }

        .contact:hover,
        .cta-button:hover {
            transition: all 0.4s ease-in-out;
            cursor: pointer;
            box-shadow: 0 0 10px rgb(155, 155, 155);
            background-color: aqua;
            transform: translateX(5px);
            color: black;
        }

        @media (max-width: 1440px) {
            html {
                overflow: hidden;
            }
            .home-section {
                gap: 50px;
            }

            .home-content h1 {
                font-size: 60px;
            }

            .home-content h3 {
                font-size: 30px;
            }

            .home-img img {
                width: 33vw;

            }
        }

        @media (max-width: 1000px) {
            html {
                overflow: visible;
            }
            header {
                justify-content: space-around;
                padding: 0 20px;
            }
            header .logo {
                margin-left: 1.75%;
                width: 100px;
            }

            .navbar ul li {
                margin: 10px 18px;
            }
            .navbar ul li a {
                font-size: 14px;
            }

            #menu-icon {
                display: none;
            }

            .sidebar {
                display: none;
            }

            .home-section {
                width: 90%;
                margin: 0 auto;
                display: grid;
                justify-content: space-around;
                align-items: center;
                text-align: center;
                gap: 80px;
                background-color: black;
                height: auto;
                padding-top: 15%;
                padding-bottom: 10%;
                white-space: normal;
            }


            .home-content {
                text-wrap: balance;
            }

            .home-content h1 {
                font-size: 50px;
                font-weight: 600;
                line-height: 0.4px;
                font-family: "Sora", sans-serif;
            }

            .home-content h3 {
                font-size: 22px;
                margin-bottom: 10px;
                font-weight: 500;
                font-family: "Sora", sans-serif;
            }

            .home-img img {
                position: relative;
                min-width: 50vw;
                box-shadow: 0 0 25px rgb(90, 90, 90);
                transition: all 0.4s ease-in-out;
            }

            ul,
            li {
                list-style: none;
                display: flex;
                flex-direction: row;
                margin: 10px;
                gap: 5px;
                font-size: small;
            }

            .socials a {
                display: inline-flex;
                justify-content: center;
                align-items: center;
                width: 3rem;
                height: 3rem;
                margin-bottom: 5px;
                margin-left: 5px;
                background-color: transparent;
                text-decoration: none;
                color: white;
                font-size: 25px;
                border-radius: 50%;
                transition: all 0.4s ease-in-out;
            }

            .navbar {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                height: auto;
            }

            .contact {
                margin-right: 30%;
                text-wrap: none;
                display: inline-block;
                padding: 10px 40px;
                background-color: black;
                border-radius: 80px;
                font-size: 15px;
                
                color: aqua;
                text-decoration: none;
                letter-spacing: 0.5px;
                font-weight: 500;
                border: 2px solid aqua;
                transition: all 0.4s ease-in-out;
                text-wrap: none;
            }

            .cta-button {
                display: inline-block;
                padding: 15px 50px;
                background-color: black;
                border-radius: 80px;
                font-size: 18px;
                margin-top: 5px;
                color: aqua;
                text-decoration: none;
                letter-spacing: 0.5px;
                font-weight: 500;
                border: 2px solid aqua;
                transition: all 0.4s ease-in-out;
            }

            .cta-button:hover {
                transition: all 0.4s ease-in-out;
                cursor: pointer;
                box-shadow: 0 0 10px rgb(155, 155, 155);
                background-color: aqua;
                transform: translateX(5px);
                color: black;
            }
        }

        @media (max-width: 750px) {
            html {
                overflow: visible;
            }
            body {
                width: 100%;
                padding: 0;
            }

            header {
                justify-content: space-between;
                padding: 0 10px;
            }

            header .logo {
                width: 90px;
                margin-left: 5%;
            }
            .navbar {
                display: none;
            }


            #menu-icon {
                display: block;
                margin-right: 5%;
            }

            .sidebar {
                display: block;
                left: -100%;
                width: 230px;
            }

            .sidebar.active {
                left: 0;
            }

            .home-section {
                margin: 0 auto;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                gap: 40px;
                background-color: black;
                padding-top: 20%;
                height: auto;
                padding-bottom: 10%;
            }

            .home-content h1 {
                font-size: 40px;
                font-weight: 600;
                line-height: 1.1;
                font-family: "Sora", sans-serif;
            }

            .home-content h3 {
                font-size: 25px;
            }

            .home-img img {
                width: 70vw;
            }

            .socials a {
                width: 2.4rem;
                height: 2.4rem;
                font-size: 20px;
            }

            .cta-button {
                padding: 15px 40px;
                font-size: 16px;
            }

            .sidebar-links a {
                font-size: 15px;
            }

            .contact {
                display: none;
            }
        }
    </style>
</head>

<script>
    // Smooth scroll to section
    function smoothScroll(targetId) {
        const element = document.getElementById(targetId);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth' });
        }
    }

    // Mobile menu toggle
    function toggleMobileMenu() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            sidebar.classList.toggle('active');
        }
    }

    // Sidebar event listeners
    document.addEventListener('DOMContentLoaded', function () {
        const menuToggle = document.getElementById('menu-icon');
        const sidebarClose = document.querySelector('.sidebar-close');
        const sidebarLinks = document.querySelectorAll('.sidebar-links a');
        const sidebar = document.getElementById('sidebar');

        // Toggle sidebar on hamburger click
        if (menuToggle) {
            menuToggle.addEventListener('click', toggleMobileMenu);
        }

        // Close sidebar on X click
        if (sidebarClose) {
            sidebarClose.addEventListener('click', function () {
                sidebar.classList.remove('active');
            });
        }

        // Close sidebar when a link is clicked
        sidebarLinks.forEach(link => {
            link.addEventListener('click', function () {
                sidebar.classList.remove('active');
            });
        });

        // Close sidebar when clicking outside of it
        document.addEventListener('click', function (event) {
            if (sidebar && menuToggle) {
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnMenu = menuToggle.contains(event.target);
                if (!isClickInsideSidebar && !isClickOnMenu && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });
    });
</script>
