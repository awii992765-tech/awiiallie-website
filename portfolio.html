            cursor: pointer;
            position: fixed;
            position-anchor: --carousel1;
            position-area: right center;
            translate: -50%;
        }
        .carousel1::scroll-button(left) {
            content: '←';
            border: none;
            font-family: 'Genos', sans-serif;
            font-size: 2rem;
            background-color: aqua;

            position-area: left center;

        }

<script>
// Smooth scroll to section
    function smoothScroll(targetId) {
        const element = document.getElementById(targetId);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth' });
        }
    }

// Mobile menu toggle
    function toggleMobileMenu() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            sidebar.classList.toggle('active');
        }
    }

// Sidebar event listeners
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.getElementById('menu-icon');
        const sidebarClose = document.querySelector('.sidebar-close');
        const sidebarLinks = document.querySelectorAll('.sidebar-links a');
        const sidebar = document.getElementById('sidebar');

        // Toggle sidebar on hamburger click
        if (menuToggle) {
            menuToggle.addEventListener('click', toggleMobileMenu);
        }

        // Close sidebar on X click
        if (sidebarClose) {
            sidebarClose.addEventListener('click', function() {
                sidebar.classList.remove('active');
            });
        }

        // Close sidebar when a link is clicked
        sidebarLinks.forEach(link => {
            link.addEventListener('click', function() {
                sidebar.classList.remove('active');
            });
        });

        // Close sidebar when clicking outside of it
        document.addEventListener('click', function(event) {
            if (sidebar && menuToggle) {
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnMenu = menuToggle.contains(event.target);
                if (!isClickInsideSidebar && !isClickOnMenu && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });
    });
</script>
